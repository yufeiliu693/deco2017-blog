<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <main>
        <section class="post-hero">
            <a class="back-link" href=" ">Back to all posts</a >
            <h1>{{title}}</h1>

            <div class="post-meta">
                <p class="date">{{date}}</p >
                <p class="author">{{author}}</p >
            </div>
        </section>

        <section class="post-shell">
            <article>
                {{content}}
            </article>

            <hr>

            <ul class="tags-list">
                {{tags}}
            </ul>
        </section>
    </main>

    <footer class="site-footer">
        <p>DECO2017 · Sydney Life Aid · Yuxi Deng</p >
    </footer>

</body>

</html>
