<li class="post-card">
    <a class="post-card-link" href=" ">
        <span class="post-title">{{title}}</span>

        <p class="summary">{{summary}}</p >

        <div class="post-card-meta">
            <span class="date">{{date}}</span>
            <span class="author">{{author}}</span>
        </div>

        <ul class="tags-list">
            {{tags}}
        </ul>
    </a >
</li>
